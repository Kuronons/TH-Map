<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teddy's Haven Companion Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="sidebar">
  <h1>🧸 Teddy's Haven</h1>
  <p class="subtitle">Explorer’s Companion</p>

  <div class="filter-group">
<h3>Map Filters</h3>

<label><input type="checkbox" checked data-layer="home"> Home</label>
<label><input type="checkbox" checked data-layer="fruits"> Fruits</label>
<label><input type="checkbox" checked data-layer="stone"> Stone</label>
<label><input type="checkbox" checked data-layer="ore"> Ore</label>
<label><input type="checkbox" checked data-layer="creatures"> Creatures</label>
<label><input type="checkbox" checked data-layer="visitors"> Magical Visitors</label>
  </div>

  <h3>Season</h3>

<select id="seasonSelect">
  <option value="all">All Season</option>
  <option value="spring">Spring</option>
  <option value="summer">Summer</option>
  <option value="fall">Fall</option>
  <option value="winter">Winter</option>
</select>
  
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

  <script src="fruits.js"></script>

<script>
const map = document.getElementById("map");
const seasonSelect = document.getElementById("seasonSelect");

function drawFruits() {

  document.querySelectorAll(".fruitMarker")
    .forEach(m => m.remove());

  const season = seasonSelect.value;

  fruits.forEach(fruit => {

    let items = [
      ...fruit.seasons.all,
      ...(fruit.seasons[season] || [])
    ];

    items.forEach(item => {

      const marker = document.createElement("div");
      marker.className = "fruitMarker";

      marker.style.left = fruit.x + "%";
      marker.style.top = fruit.y + "%";

      marker.title = item;

      map.appendChild(marker);
    });
  });
}

seasonSelect.addEventListener("change", drawFruits);

drawFruits();
</script>
</body>
</html>
